<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Vendor Halal Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --text-dark: #1F2937; --bg-cream: #FCFAF7; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .phone { width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        .header { padding: 50px 24px 15px; background: white; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { font-size: 24px; cursor: pointer; color: #374151; }
        h1 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 1000; color: #111827; }
        .content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-cream); scrollbar-width: none; }
        .vendor-card { background: white; border-radius: 30px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.02); box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .vendor-top { height: 160px; position: relative; display: flex; align-items: center; justify-content: center; font-size: 50px; background: #F9FAFB; }
        .halal-badge { position: absolute; top: 15px; left: 15px; background: #059669; color: white; font-size: 10px; font-weight: 900; padding: 5px 12px; border-radius: 8px; letter-spacing: 1px; }
        .vendor-body { padding: 20px; }
        .v-name { font-size: 17px; font-weight: 900; color: #111827; margin-bottom: 4px; }
        .btn-group { display: flex; gap: 12px; margin-top: 15px; }
        .v-btn { flex: 1; padding: 14px; border-radius: 15px; font-size: 14px; font-weight: 800; text-align: center; cursor: pointer; border: none; }
        .btn-reserve { background: var(--gold); color: white; }
    </style>
</head>
<body>
    <div class="phone">
        <header class="header"><div class="back-btn" onclick="location.href='islam_preview.html'">←</div><h1 data-t="halal_vendors">Vendor Halal</h1><div style="font-size:20px; color:var(--gold);">💎</div></header>
        <div class="content">
            <div class="vendor-card">
                <div class="vendor-top" style="background: linear-gradient(135deg, #DEB887, #D2B48C);"><div class="halal-badge">JAKIM HALAL</div>💍</div>
                <div class="vendor-body"><div class="v-name">Pesona Permata</div><div class="btn-group"><div class="v-btn btn-reserve" onclick="alert('Proceeding to booking...')">Tempah</div></div></div>
            </div>
        </div>
    </div>
</body>
</html>
