<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Pilih Bahasa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --bg-cream: #FCFAF7; --text-dark: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .phone { 
            width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; 
            position: relative; overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.1); 
        }
        .header { padding: 60px 24px 20px; background: white; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; gap: 15px; }
        .back-btn { font-size: 24px; color: #9CA3AF; cursor: pointer; text-decoration: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: var(--text-dark); }
        
        .content { flex: 1; padding: 24px; overflow-y: auto; background: var(--bg-cream); }
        
        .section-label { font-size: 11px; font-weight: 950; color: #9CA3AF; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; display: block; }
        
        .lang-card { background: white; border-radius: 20px; border: 2px solid transparent; padding: 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .lang-card.active { border-color: var(--gold); background: #FFFDF9; }
        
        .lang-info { display: flex; align-items: center; gap: 15px; }
        .lang-flag { font-size: 24px; }
        .lang-names { display: flex; flex-direction: column; }
        .lang-main { font-size: 16px; font-weight: 800; color: var(--text-dark); }
        .lang-sub { font-size: 12px; font-weight: 600; color: #9CA3AF; }
        
        .check-icon { color: var(--gold); font-size: 20px; display: none; }
        .lang-card.active .check-icon { display: block; }

        .footer-note { text-align: center; font-size: 12px; color: #9CA3AF; font-weight: 500; padding: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="phone">
        <header class="header">
            <a href="settings_preview.html" class="back-btn">‹</a>
            <h1 data-t="change_lang">Pilih Bahasa</h1>
        </header>

        <div class="content">
            <span class="section-label">PILIKAN BAHASA / LANGUAGE SELECTION</span>
            
            <div class="lang-card" onclick="selectLang('ms')" id="card-ms">
                <div class="lang-info">
                    <div class="lang-flag">🇲🇾</div>
                    <div class="lang-names">
                        <div class="lang-main">Bahasa Melayu</div>
                        <div class="lang-sub">Malay</div>
                    </div>
                </div>
                <div class="check-icon">✓</div>
            </div>

            <div class="lang-card" onclick="selectLang('en')" id="card-en">
                <div class="lang-info">
                    <div class="lang-flag">🇬🇧</div>
                    <div class="lang-names">
                        <div class="lang-main">English</div>
                        <div class="lang-sub">Inggeris</div>
                    </div>
                </div>
                <div class="check-icon">✓</div>
            </div>

            <div class="lang-card" onclick="selectLang('ar')" id="card-ar">
                <div class="lang-info">
                    <div class="lang-flag">🇸🇦</div>
                    <div class="lang-names">
                        <div class="lang-main">العربية</div>
                        <div class="lang-sub">Arabic</div>
                    </div>
                </div>
                <div class="check-icon">✓</div>
            </div>

            <div class="footer-note">
                Sila pilih bahasa yang anda selesa untuk menggunakan aplikasi Jodohku.
            </div>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';
        
        function updateActive() {
            const current = window.I18N.getLang();
            document.querySelectorAll('.lang-card').forEach(c => c.classList.remove('active'));
            const active = document.getElementById(`card-${current}`);
            if(active) active.classList.add('active');
        }

        window.selectLang = (lang) => {
            window.I18N.setLang(lang);
            updateActive();
            // Optional: Auto redirect back or show success before redirect
            setTimeout(() => {
                window.location.href = 'settings_preview.html';
            }, 300);
        }

        window.addEventListener('DOMContentLoaded', () => {
            if(window.I18N) window.I18N.translatePage();
            updateActive();
        });
    </script>
</body>
</html>
