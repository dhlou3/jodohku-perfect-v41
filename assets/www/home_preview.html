<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Utama (Final Zero-Fault V14)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;950&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --bg-cream: #FCFAF7; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background:#E5E7EB; min-height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        .phone { 
            width:375px; height:812px; background:white; border-radius:44px; border:8px solid #1E293B; 
            position:relative; overflow:hidden; display:flex; flex-direction:column; 
            box-shadow:0 40px 80px rgba(0,0,0,0.1); 
            transition: all 0.3s ease;
        }

        /* Mobile-Native Breakpoint */
        @media (max-width: 480px) {
            body { background: white; }
            .phone { width: 100vw; height: 100vh; border: none; border-radius: 0; }
        }

        .header { padding: 55px 24px 15px; padding-top: max(55px, env(safe-area-inset-top)); background:white; border-bottom:1px solid #F3F4F6; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .logo { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 1000; color: var(--gold); }
        .icon-btn { width: 40px; height: 40px; border-radius: 12px; background: #F9FAFB; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: 1px solid #F3F4F6; }
        .content { flex: 1; overflow-y: auto; padding: 10px 15px; background: var(--bg-cream); display: flex; flex-direction: column; position: relative; scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }
        .profile-card { width: 100%; height: 100%; background: white; border-radius: 35px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        .image-section { height: 420px; background: #BD8B52; position: relative; border-radius: 30px; margin-bottom: 12px; }
        .hero-image { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card-body { padding: 10px 0; }
        .user-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 1000; color: #111827; }
        .action-float { padding: 20px 0 30px; display: flex; justify-content: center; gap: 20px; z-index: 20; position: relative; margin-top: -35px; }
        .btn-round { width: 68px; height: 68px; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 1px solid #F3F4F6; box-shadow: 0 15px 35px rgba(0,0,0,0.1); cursor: pointer; transition: 0.2s; }
        .nav-bar { width: 100%; height: 95px; background: white; border-top: 1px solid #F3F4F6; display: flex; justify-content: space-around; padding: 12px; position: relative; z-index: 30; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #9CA3AF; font-size: 10px; font-weight: 800; flex: 1; }
        .nav-item.active { color: var(--gold); } .nav-icon { font-size: 24px; margin-bottom: 5px; }

        .indicator.active .indicator-progress { width:100%; }

        /* Filter Drawer */
        .drawer-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:40; display:none; backdrop-filter:blur(4px); }
        .filter-drawer { 
            position:absolute; bottom:0; left:0; width:100%; background:white; 
            border-top-left-radius:40px; border-top-right-radius:40px; z-index:50; padding:32px 24px;
            transition:0.5s cubic-bezier(0.4, 0, 0.2, 1); box-shadow:0 -20px 40px rgba(0,0,0,0.1);
            transform: translateY(100%);
        }
        .filter-drawer.open { transform: translateY(0); }
        
        .f-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; }
        .f-title { font-family:'Playfair Display', serif; font-size:24px; font-weight:900; color:#111827; }
        
        .f-row { margin-bottom:20px; }
        .f-label { font-size:11px; font-weight:950; color:var(--gold); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px; display:block; }
        
        input[type="range"] { 
            width:100%; -webkit-appearance:none; height:4px; background:#F3F4F6; border-radius:10px; accent-color:var(--gold);
        }
        
        .chip-box { display:flex; flex-wrap:wrap; gap:8px; }
        .chip { 
            padding:8px 16px; border-radius:100px; border:1px solid #F3F4F6; font-size:12px; font-weight:800; cursor:pointer; transition:0.3s;
            color:#9CA3AF; background:white;
        }
        .chip.active { background:var(--gold); color:white; border-color:var(--gold); }
        
        .btn-apply { 
            width:100%; padding:18px; background:var(--gold); color:white; border-radius:100px; font-weight:900; border:none; margin-top:10px; cursor:pointer;
            box-shadow:0 10px 20px rgba(189, 139, 82, 0.2);
        }

        /* Elite Loader */
        .elite-loader { display:flex; flex-direction:column; align-items:center; justify-content:center; padding-top:150px; }
        .radar { width:80px; height:80px; border:2px solid var(--gold); border-radius:50%; position:relative; margin-bottom:24px; }
        .radar::after { content:''; position:absolute; inset:-4px; border:2px solid var(--gold); border-radius:50%; opacity:0.3; animation: pulse 1.5s infinite; }
        @keyframes pulse { from { transform:scale(1); opacity:0.5; } to { transform:scale(1.5); opacity:0; } }
        .scanning-text { font-size:12px; font-weight:950; color:var(--gold); letter-spacing:2px; text-transform:uppercase; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity:1; } 50% { opacity:0.5; } }
    </style>
</head>
<body>
    <div class="phone">
        <header class="header">
            <div class="logo">Jodohku</div>
            <div class="header-actions" style="display:flex; gap:12px;">
                <div class="icon-btn" onclick="openFilters()">⌥</div>
                <div class="icon-btn" onclick="location.href='settings_preview.html'">⚙️</div>
            </div>
        </header>
        <div class="content">
            <div id="pC" style="flex:1; position:relative;">
                <div class="elite-loader">
                    <div class="radar"></div>
                    <div class="scanning-text" data-t="searching">MENCARI CALON ELIT...</div>
                </div>
            </div>
            <div class="action-float"><button class="btn-round" onclick="next()">✕</button><div style="width:40px;"></div><button class="btn-round" style="color:#F43F5E;" onclick="like()">❤️</button></div>
        </div>
        <nav class="nav-bar">
            <a href="home_preview.html" class="nav-item active"><div class="nav-icon">🏠</div><span data-t="home">Utama</span></a>
            <a href="explore_preview.html" class="nav-item"><div class="nav-icon">🔍</div><span data-t="explore">Jelajah</span></a>
            <a href="sembang.html" class="nav-item"><div class="nav-icon">💬</div><span data-t="chat">Sembang</span></a>
            <a href="islam_preview.html" class="nav-item"><div class="nav-icon">🕌</div><span data-t="islam">Islam</span></a>
            <a href="profile_preview.html" class="nav-item"><div class="nav-icon">👤</div><span data-t="profile">Saya</span></a>
        </nav>

        <!-- Filter Overlay & Drawer -->
        <div id="filterOverlay" class="drawer-overlay" onclick="closeFilters()"></div>
        <div id="filterDrawer" class="filter-drawer">
            <div class="f-header">
                <span class="f-title" data-t="filter_title">Tapis Calon</span>
                <span style="font-size:24px; cursor:pointer; color:#9CA3AF;" onclick="closeFilters()">✕</span>
            </div>
            
            <div class="f-rows" style="max-height:450px; overflow-y:auto; padding-right:5px; scrollbar-width:none;">
                <div class="f-row">
                    <span class="f-label" data-t="lokasi_pilihan">Lokasi Pilihan</span>
                    <select id="stateSelect" class="f-select" style="width:100%; padding:14px; border-radius:15px; border:1px solid #F3F4F6; font-size:14px; font-weight:600; color:#111827; outline:none; background:#F9FAFB;">
                        <option value="all" data-t="semua_negeri">Semua Negeri</option>
                        <option value="Selangor">Selangor</option>
                        <option value="Kuala Lumpur">Kuala Lumpur</option>
                        <option value="Johor">Johor</option>
                        <option value="Penang">Penang</option>
                        <option value="Perak">Perak</option>
                        <option value="Kedah">Kedah</option>
                        <option value="Melaka">Melaka</option>
                        <option value="Negeri Sembilan">Negeri Sembilan</option>
                        <option value="Pahang">Pahang</option>
                        <option value="Kelantan">Kelantan</option>
                        <option value="Terengganu">Terengganu</option>
                        <option value="Perlis">Perlis</option>
                        <option value="Sabah">Sabah</option>
                        <option value="Sarawak">Sarawak</option>
                    </select>
                </div>

                <div class="f-row">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="f-label" data-t="jarak_maks">Jarak Maksimum</span>
                        <span id="distVal" style="font-size:12px; font-weight:800; color:var(--gold);">50km</span>
                    </div>
                    <input type="range" id="distRange" min="5" max="250" step="5" value="50" oninput="updateFVal('distVal', this.value+'km')">
                </div>

                <div class="f-row">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span class="f-label" data-t="kompatibiliti_min">Kompatibiliti Min (%)</span>
                        <span id="compVal" style="font-size:12px; font-weight:800; color:var(--gold);">65%</span>
                    </div>
                    <input type="range" id="compRange" min="50" max="95" step="5" value="65" oninput="updateFVal('compVal', this.value+'%')">
                </div>

                <div class="f-row">
                    <span class="f-label" data-t="minat_shared">Minat & Hobi</span>
                    <div class="chip-box" id="interestChips">
                        <!-- Chips injected by JS -->
                    </div>
                </div>

                <div class="f-row" style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="f-label" data-t="hanya_yang_ada_bio">Hanya Ada Bio</span>
                    <input type="checkbox" id="bioCheck" style="width:24px; height:24px; accent-color:var(--gold);">
                </div>
            </div>

            <button class="btn-apply" onclick="applyAndClose()" data-t="terapkan">JANA CADANGAN ELIT</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';
        
        let allProfiles = []; let profiles = []; let index = 0; let me = null; let currentPhotoIndex = 0;
        let selectedInterests = [];

        const INTEREST_POOL = ['interest_coding', 'interest_travel', 'interest_cooking', 'interest_gym', 'interest_reading', 'interest_islam', 'interest_hiking'];

        async function init() {
            try {
                console.log("🎬 Discovery engine starting...");
                const myId = localStorage.getItem('current_user_id'); 
                if(!myId) return;
                
                me = await DB.getCurrentUser();
                if(!me) return;
                
                // Location Prep
                const loc = await DB.updateUserLocation();
                if(loc) { me.lat = loc.lat; me.lng = loc.lng; }

                renderInterestChips();

                allProfiles = await DB.getDiscoveryUsers();
                console.log(`✅ Raw candidates found: ${allProfiles.length}`);
                
                applyFiltersLocally(); // Initial filter apply
                render();
            } catch(e) { console.error("BOOT_ERROR: ", e); }
        }

        function renderInterestChips() {
            const box = document.getElementById('interestChips');
            box.innerHTML = INTEREST_POOL.map(i => `<div class="chip" onclick="toggleChip(this, '${i}')">${window.I18N.t(i)}</div>`).join('');
        }

        window.toggleChip = (el, interest) => {
            el.classList.toggle('active');
            if(selectedInterests.includes(interest)) selectedInterests = selectedInterests.filter(x => x !== interest);
            else selectedInterests.push(interest);
        };

        window.updateFVal = (id, val) => document.getElementById(id).innerText = val;

        window.openFilters = () => {
            document.getElementById('filterOverlay').style.display = 'block';
            document.getElementById('filterDrawer').classList.add('open');
        };

        window.closeFilters = () => {
            document.getElementById('filterOverlay').style.display = 'none';
            document.getElementById('filterDrawer').classList.remove('open');
        };

        window.applyAndClose = () => {
            applyFiltersLocally();
            closeFilters();
            index = 0; // Reset view
            render();
        };

        function applyFiltersLocally() {
            const maxDist = parseInt(document.getElementById('distRange').value) || 250;
            const minComp = parseInt(document.getElementById('compRange').value) || 0; // Removed mandatory 65% floor
            const bioOnly = document.getElementById('bioCheck').checked;
            const state = document.getElementById('stateSelect').value;

            profiles = allProfiles.filter(u => {
                const dist = DB.calculateDistance(me, u);
                const score = DB.calculateMatchScore(me, u);
                const hasBio = !!(u.bio && u.bio.length > 5);
                
                // Matches Location (State)
                let locationMatch = true;
                if(state !== 'all') {
                    const uState = (u.birthState || u.city || "").toLowerCase();
                    locationMatch = uState.includes(state.toLowerCase());
                }

                // Matches Interests
                let interestMatch = true;
                if(selectedInterests.length > 0) {
                    const uInterests = u.interests || [];
                    interestMatch = selectedInterests.some(i => uInterests.includes(i));
                }

                // Lenient filters: Always show matches regardless of score during demo
                return dist <= maxDist && score >= minComp && (!bioOnly || hasBio) && interestMatch && locationMatch;
            });
            console.log(`🔍 Filtered to: ${profiles.length} candidates`);
        }

        function render() {
            const u = profiles[index]; 
            if(!u) { 
                document.getElementById('pC').innerHTML = `
                    <div style="text-align:center; padding-top:100px; padding:40px;">
                        <div style="font-size:48px; margin-bottom:20px;">🕊️</div>
                        <h3 style="font-family:'Playfair Display'; font-size:22px; color:#111827; margin-bottom:12px;" data-t="tiada_calon_ditemui">${window.I18N.t('no_profiles')}</h3>
                        <p style="font-size:14px; color:#9CA3AF; margin-bottom:30px; font-weight:600;" data-t="cuba_luaskan_tapis">${window.I18N.t('tip_low')}</p>
                        <button onclick="openFilters()" style="background:var(--gold); color:white; border:none; padding:18px 40px; border-radius:100px; font-weight:900; cursor:pointer; box-shadow:0 10px 20px rgba(189,139,82,0.2);" data-t="laraskan_tapis">
                            ${window.I18N.getLang() === 'en' ? 'ADJUST FILTERS' : 'LARASKAN TAPIS'}
                        </button>
                    </div>
                `; 
                return; 
            }
            
            const score = DB.calculateMatchScore(me, u);
            const labelKey = DB.getMatchLabel(score);
            const photos = u.photos || [u.photoUrl];
            const currentPhoto = photos[currentPhotoIndex] || u.photoUrl;
            const name = u.fullName || u.name || "User";
            
            document.getElementById('pC').innerHTML = `
                <div class="profile-card" style="height:auto; min-height:100%; box-shadow:none; border:none; background:transparent;">
                    <div class="image-section" style="border:1px solid #F3F4F6;">
                        <div class="photo-indicators">
                            ${photos.map((_, i) => `<div class="indicator ${i === currentPhotoIndex ? 'active' : ''}"><div class="indicator-progress" style="width:${i === currentPhotoIndex ? '100%' : '0'}"></div></div>`).join('')}
                        </div>
                        <div class="photo-nav left" onclick="changePhoto(-1)"></div>
                        <div class="photo-nav right" onclick="changePhoto(1)"></div>
                        <img src="${currentPhoto}" class="hero-image" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=BD8B52&color=fff&size=512'">
                        <div style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); padding:8px 16px; border-radius:100px; border:1.5px solid var(--gold); display:flex; align-items:center; gap:8px; box-shadow:0 10px 25px rgba(0,0,0,0.1);">
                            <div style="font-size:16px;">✨</div>
                            <div>
                                <div style="font-size:11px; font-weight:950; color:var(--gold); line-height:1;">${score}% ${window.I18N.t('match_label')}</div>
                                <div style="font-size:9px; font-weight:800; color:#374151;">${window.I18N.t(labelKey)}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div style="padding:15px; text-align:left;">
                        <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
                            <div style="font-family:'Playfair Display', serif; font-size:28px; font-weight:1000; color:#BD8B52;">${name}</div>
                            <div style="font-size:12px; font-weight:950; color:#9CA3AF; letter-spacing:1px;">${u.jodohkuId || 'JDK-ELITE'}</div>
                        </div>
                        <div style="font-size:14px; font-weight:800; color:#374151;">
                            ${u.profession || window.I18N.t('profesional')} • ${u.birthState || 'Malaysia'} • ${u.age || 25} ${window.I18N.t('years_old')}
                            <span style="color:var(--gold); margin-left:8px;">(${DB.calculateDistance(me, u)} ${window.I18N.t('km_away')})</span>
                        </div>
                    </div>

                    <div style="background:white; border-radius:24px; padding:20px; margin-bottom:15px; border:1px solid #F3F4F6;">
                        <div style="font-size:11px; font-weight:950; color:var(--gold); margin-bottom:12px; letter-spacing:1px;">📝 ${window.I18N.t('status_hari_ini')}</div>
                        <div style="font-size:15px; color:#1F2937; line-height:1.6; font-weight:500;">${u.bio || u.statusHariIni || "As-salam, saya mencari teman syurga."}</div>
                    </div>

                    <div style="display:flex; flex-wrap:wrap; gap:8px; padding-bottom:30px;">
                        ${(u.interests || []).slice(0,3).map(t => `<div style="background:white; padding:8px 16px; border-radius:100px; border:1px solid #E5E7EB; font-size:12px; font-weight:800; color:#374151;">${window.I18N.t(t)}</div>`).join('')}
                    </div>
                </div>
            `;
            document.querySelector('.content').scrollTop = 0;
        }

        window.changePhoto = (dir) => {
            const u = profiles[index]; if(!u || !u.photos) return;
            currentPhotoIndex = (currentPhotoIndex + dir + u.photos.length) % u.photos.length;
            render();
        };

        window.next = async () => { if(!profiles[index]) return; await DB.recordSkip(me.uid, profiles[index].uid); index++; currentPhotoIndex = 0; render(); };
        window.like = async () => { 
            if(!profiles[index]) return; 
            const res = await DB.recordLike(me.uid, profiles[index].uid);
            if(res === 'match') alert(window.I18N.t('match_success') || "Tahniah! Padanan baru.");
            index++; currentPhotoIndex = 0; render(); 
        };
        init();
    </script>
</body>
</html>
