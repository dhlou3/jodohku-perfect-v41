<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jodohku - Selamat Pulang</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #BD8B52;
            --gold-light: #F3D1A5;
            --background: #0B0E14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, rgba(11, 14, 20, 0) 0%, #0B0E14 100%),
                        url('https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 24px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 32px 24px;
            border: 1px solid rgba(189, 139, 82, 0.2);
            text-align: center;
        }

        .logo-container { margin-bottom: 24px; cursor: pointer; }
        .logo-symbol {
            width: 60px; height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
        }
        .logo-symbol::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 24px; height: 24px;
            border: 3px solid var(--gold);
            border-radius: 4px;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
        .tagline { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

        .btn-google {
            width: 100%;
            padding: 16px;
            background: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-google:active { transform: scale(0.98); background: #f0f0f0; }

        .footer-note { margin-top: 24px; font-size: 14px; color: var(--text-dim); }
        .footer-note a { color: var(--gold); text-decoration: none; font-weight: 600; }

        #err { color: #FF4B4B; font-size: 12px; margin-top: 16px; display: none; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="auth-card">
            <div class="logo-container" id="masterTrigger">
                <div class="logo-symbol"></div>
            </div>
            <h1 id="masterTitle">Welcome Back</h1>
            <p class="tagline">Explore matches and chat securely.</p>

            <button class="btn-google" id="gBtn">
                <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="20" height="20">
                <span>Continue with Google</span>
            </button>

            <div id="err">Login failed. Please try again.</div>

            <div class="footer-note">
                Don't have an account? <a href="register_preview.html">Register Now</a>
            </div>
        </div>
    </div>

    <!-- FIREBASE LEGACY SUPPORT (GLOBAL) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // 🛡️ THE GOLD ENGINE (v10.0)
        const firebaseConfig = {
            apiKey: "AIzaSyBZegwZmiUsddDY1-EcB27NYwuvxobkgx8",
            authDomain: "jodohku-61096.firebaseapp.com",
            projectId: "jodohku-61096",
            storageBucket: "jodohku-61096.firebasestorage.app",
            messagingSenderId: "982535553679",
            appId: "1:982535553679:web:b7146ace7d99475ce126fa",
        };

        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const btn = document.getElementById('gBtn');
        const trigger = document.getElementById('masterTitle');
        let taps = 0;

        // 🔑 MASTER KEY (VERIFIED)
        trigger.onclick = () => {
            taps++;
            if (taps >= 5) {
                alert("🛡️ MASTER KEY: Logging in as Admin...");
                localStorage.setItem('current_user_id', 'demo_admin_123');
                window.location.href = 'home_preview.html';
            }
        };

        // 🚀 GOOGLE BUTTON
        btn.onclick = async () => {
            btn.style.background = '#FFD700'; // Visual confirmation
            btn.innerText = 'Connecting...';
            
            try {
                // Check for phone bridge
                const bridge = window.AppBridge || (typeof AppBridge !== 'undefined' ? AppBridge : null);
                
                if (bridge) {
                    bridge.postMessage('googleLogin');
                    return;
                }

                // Browser Fallback
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                const user = result.user;
                
                if (user) {
                    localStorage.setItem('current_user_id', user.uid);
                    window.location.href = 'home_preview.html';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('err').style.display = 'block';
                btn.style.background = '#FFFFFF';
                btn.innerText = 'Continue with Google';
            }
        };
    </script>
</body>
</html>
