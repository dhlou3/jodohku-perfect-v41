<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jodohku - Selamat Pulang</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #BD8B52;
            --background: #0B0E14;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100%;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, rgba(11, 14, 20, 0.4) 0%, #0B0E14 100%),
                        url('https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 24px;
        }

        .hero-section {
            position: absolute;
            top: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 40px;
        }

        .logo-symbol {
            width: 60px; height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(189,139,82,0.1);
            position: relative;
        }
        .logo-symbol::after {
            content: 'G';
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--gold);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 36px; margin-bottom: 8px; }
        .tagline { color: var(--text-dim); font-size: 16px; font-weight: 300; }

        .auth-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 32px 24px;
            border: 1px solid rgba(189, 139, 82, 0.1);
            text-align: center;
            margin-bottom: 20px;
        }

        .btn-google {
            width: 100%;
            padding: 18px;
            background: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .biometric-btn {
            width: 60px; height: 60px; border-radius: 50%;
            border: 1px solid rgba(189, 139, 82, 0.3);
            background: rgba(189, 139, 82, 0.05);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto; cursor: pointer;
        }

        .footer-note { margin-top: 24px; font-size: 14px; color: var(--text-dim); }
        .footer-note a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="hero-section">
            <div class="logo-symbol" id="masterTrigger"></div>
            <h1>Welcome Back</h1>
            <p class="tagline">Explore matches and chat securely.</p>
        </div>
        <div class="auth-card">
            <button class="btn-google" id="gBtn">
                <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="22" height="22">
                <span>Continue with Google</span>
            </button>
            <div class="biometric-btn" id="bioBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 11c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2s-2-.9-2-2v-2c0-1.1.9-2 2-2z"/><path d="M18 11c0-3.3-2.7-6-6-6s-6 2.7-6 6v10"/><path d="M22 11c0-5.5-4.5-10-10-10S2 5.5 2 11v10"/></svg>
            </div>
            <div class="footer-note">Don't have an account? <a href="register_preview.html">Register Now</a></div>
        </div>
    </div>

    <!-- FIREBASE BASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZegwZmiUsddDY1-EcB27NYwuvxobkgx8",
            authDomain: "jodohku-61096.firebaseapp.com",
            projectId: "jodohku-61096",
            storageBucket: "jodohku-61096.firebasestorage.app",
            messagingSenderId: "982535553679",
            appId: "1:982535553679:web:b7146ace7d99475ce126fa",
        };
        firebase.initializeApp(firebaseConfig);

        const btn = document.getElementById('gBtn');
        const trigger = document.getElementById('masterTrigger');
        let taps = 0;

        trigger.onclick = () => {
            taps++;
            if (taps >= 5) {
                localStorage.setItem('current_user_id', 'demo_admin_123');
                window.location.href = 'home_preview.html';
            }
        };

        btn.onclick = async () => {
            btn.innerText = 'Connecting...';
            // SMART DETECTION
            const isApk = (navigator.userAgent.includes('Android') && !navigator.userAgent.includes('Chrome'));
            
            if (isApk) {
                // PHONE MODE: Use Tunnel
                window.location.href = "appbridge://googleLogin";
            } else {
                // WEB MODE: Use Popup
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    const result = await firebase.auth().signInWithPopup(provider);
                    if (result.user) {
                        localStorage.setItem('current_user_id', result.user.uid);
                        window.location.href = 'home_preview.html';
                    }
                } catch (e) {
                    alert("Browser Error: " + e.message);
                    btn.innerText = 'Continue with Google';
                }
            }
        };
    </script>
</body>
</html>
