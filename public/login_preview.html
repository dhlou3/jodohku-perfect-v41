<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Log Masuk (Final Restore)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --bg-midnight: #0B0E14; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .phone { width: 375px; height: 812px; background: var(--bg-midnight); border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; color: white; box-shadow: 0 40px 80px rgba(0,0,0,0.4); }
        
        .bg-img {
            position: absolute;
            inset: 0;
            background-image: url('assets/images/wedding_hero.png');
            background-size: cover;
            background-position: center;
            z-index: 0;
            filter: saturate(0.6) brightness(0.4);
        }

        .gradient-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(11, 14, 20, 0.1) 0%, rgba(11, 14, 20, 0.6) 50%, rgba(11, 14, 20, 0.9) 100%);
            z-index: 1;
        }

        .accent-glow {
            position: absolute;
            top: -100px;
            right: -50px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(189, 139, 82, 0.15) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        .page-content { 
            flex: 1; 
            padding: 50px 24px; 
            display: flex; 
            flex-direction: column; 
            z-index: 3; 
            position: relative;
        }
        
        .back-btn { 
            color: white; text-decoration: none; font-size: 14px; margin-bottom: 30px; 
            display: flex; align-items: center; gap: 12px; opacity: 0.7; font-weight: 600; transition: 0.3s;
        }
        .back-btn:hover { opacity: 1; transform: translateX(-3px); }

        .hero-section { text-align: center; margin-top: 20px; margin-bottom: 40px; }
        .hero-icon { width: 120px; height: 120px; margin: 0 auto 30px; position: relative; }
        .hero-icon::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; background: radial-gradient(circle, rgba(189, 139, 82, 0.1) 0%, transparent 80%);
            border-radius: 50%;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 900; line-height: 1.1; margin-bottom: 12px; letter-spacing: -0.5px; }
        .tagline { font-size: 15px; color: #9CA3AF; font-weight: 500; line-height: 1.5; padding: 0 20px; }

        .action-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 20px;
            margin-top: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .btn-google {
            width: 100%;
            padding: 22px;
            background: white;
            color: #111827;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-google:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .btn-google:active { transform: scale(0.97); }

        .btn-bio {
            width: 100%;
            border: 2px solid rgba(189, 139, 82, 0.3);
            background: rgba(189, 139, 82, 0.05);
            color: var(--gold);
            padding: 20px;
            border-radius: 100px;
            font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            cursor: pointer; margin-top: 16px; transition: all 0.3s;
        }
        .btn-bio:hover { background: rgba(189, 139, 82, 0.1); }

        .footer-note { text-align: center; margin-top: 24px; font-size: 14px; color: #9CA3AF; }
        .footer-note a { color: var(--gold); text-decoration: none; font-weight: 800; margin-left: 6px; }

        #err { color:#F87171; font-size:12px; font-weight:700; margin-bottom:15px; text-align:center; display:none; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="bg-img"></div>
        <div class="gradient-overlay"></div>
        <div class="accent-glow"></div>
        <div class="page-content">
            <a href="landing_preview.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                <span data-t="back">Kembali</span>
            </a>

            <!-- HERO SECTION -->
            <div class="hero-section">
                <div class="hero-icon">
                    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="48" stroke="url(#goldGradient)" stroke-width="2" stroke-dasharray="10 5"/>
                        <!-- Fingerprint Icon -->
                        <path d="M50 35C45.5817 35 42 38.5817 42 43V57M58 43V50" stroke="var(--gold)" stroke-width="3" stroke-linecap="round"/>
                        <path d="M35 50C35 41.7157 41.7157 35 50 35C58.2843 35 65 41.7157 65 50V65M35 65V50" stroke="var(--gold)" stroke-width="3" stroke-linecap="round"/>
                        <path d="M28 60C28 47.8497 37.8497 38 50 38C62.1503 38 72 47.8497 72 60V75M28 75V60" stroke="var(--gold)" stroke-width="3" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="goldGradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#BD8B52"/>
                                <stop offset="100%" stop-color="#F3D1A5"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1 data-t="welcome_back">Selamat Pulang</h1>
                <p class="tagline" data-t="enter_email">Log masuk dengan identiti digital anda.</p>
            </div>

            <div id="err"></div>

            <!-- ACTION CARD -->
            <div class="action-card">
                <button class="btn-google" id="gLoginBtn">
                    <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="22" height="22">
                    <span>Continue with Google</span>
                </button>

                <div class="footer-note">
                    <span data-t="no_account">Belum ada akaun?</span>
                    <a href="register_preview.html" data-t="register_now">Daftar Sekarang</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Biometric Mock Overlay -->
    <div id="bioOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column; color:white; backdrop-filter:blur(20px);">
        <div style="width:140px; height:140px; border:3px solid rgba(189,139,82,0.3); border-radius:32px; display:flex; align-items:center; justify-content:center; margin-bottom:40px; position:relative; background:rgba(189,139,82,0.05);">
            <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="animation: pulse 2s infinite;"><path d="M12 11c1.1 0 2 .9 2 2v2c0 1.1-.9 2-2 2s-2-.9-2-2v-2c0-1.1.9-2 2-2z"/><path d="M18 11c0-3.3-2.7-6-6-6s-6 2.7-6 6v10"/><path d="M22 11c0-5.5-4.5-10-10-10S2 5.5 2 11v10"/></svg>
            <div style="position:absolute; bottom:0; left:0; width:100%; height:2px; background:var(--gold); box-shadow:0 0 20px var(--gold); animation: scanLine 2s infinite ease-in-out;"></div>
        </div>
        <h2 id="bioState" data-t="biometric_scan" style="font-family:'Playfair Display'; font-size:24px; font-weight:700;">Mengimbas Fingerprint...</h2>
    </div>

    <style>
        @keyframes scanLine { 0% { transform: translateY(-140px); opacity:0; } 50% { opacity:1; } 100% { transform: translateY(0); opacity:0; } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>

    <script type="module">
        import { DB } from './database.js';
        
        const gLoginBtn = document.getElementById('gLoginBtn');
        const bioBtn = document.getElementById('bioBtn');
        const err = document.getElementById('err');
        
        // 🚀 SMART GOOGLE ONE-TAP LOGIN
        gLoginBtn.onclick = async () => {
            try {
                const originalContent = gLoginBtn.innerHTML;
                gLoginBtn.innerHTML = 'Verifying...';
                gLoginBtn.style.opacity = '0.7';
                gLoginBtn.style.pointerEvents = 'none';

                // UNIVERSAL BRIDGE DETECTION (v8.0)
                const bridge = window.AppBridge || (typeof AppBridge !== 'undefined' ? AppBridge : null);
                
                if (bridge) {
                    bridge.postMessage('googleLogin');
                    return;
                }

                if (!bridge && window.location.protocol === 'file:') {
                    alert("❌ Connection Error: Phone Bridge not ready. Try again in 2 seconds.");
                    gLoginBtn.innerHTML = originalContent;
                    gLoginBtn.style.opacity = '1';
                    gLoginBtn.style.pointerEvents = 'auto';
                    return;
                }

                const gUser = await DB.signInWithGoogle();
                if (gUser) {
                    console.log("💎 [Login] Google Identity Secured:", gUser.email);
                    
                    // Check if User Exists
                    const userDoc = await DB.getUserDoc(gUser.uid);
                    
                    if (userDoc) {
                        console.log("✅ Existing user found. Routing to Home.");
                        localStorage.setItem('current_user_id', gUser.uid);
                        window.location.href = 'home_preview.html';
                    } else {
                        console.log("🆕 New Google user. Creating doc and routing to Onboarding.");
                        const finalUser = {
                            email: gUser.email,
                            photoUrl: gUser.photoUrl,
                            authProvider: 'google',
                            isIdentityVerified: false,
                            createdAt: new Date().toISOString()
                        };
                        await window.fs_sdk.setDoc(window.fs_sdk.doc(window.firestore_db, "users", gUser.uid), finalUser);
                        localStorage.setItem('current_user_id', gUser.uid);
                        localStorage.setItem('biometric_uid', gUser.uid); // Enable instant fingerprint login
                        window.location.href = 'onboarding_name.html';
                    }
                } else {
                    gLoginBtn.innerHTML = originalContent;
                    gLoginBtn.style.opacity = '1';
                    gLoginBtn.style.pointerEvents = 'auto';
                }
            } catch (e) {
                console.error("Login Fail:", e);
                err.innerText = "Gagal log masuk dengan Google.";
                err.style.display = 'block';
                setTimeout(() => location.reload(), 2000);
            }
        };

        bioBtn.onclick = () => {
            const storedUid = localStorage.getItem('biometric_uid');
            const overlay = document.getElementById('bioOverlay');
            overlay.style.display = 'flex';
            
            setTimeout(() => {
                if (storedUid) {
                    document.getElementById('bioState').innerText = (window.I18N && window.I18N.t('biometric_success')) || "Berjaya!";
                    localStorage.setItem('current_user_id', storedUid);
                    setTimeout(() => { window.location.href = 'home_preview.html'; }, 1000);
                } else {
                    document.getElementById('bioState').innerText = "Link Google Identity First";
                    document.getElementById('bioState').style.color = "#F87171";
                    setTimeout(() => { overlay.style.display = 'none'; }, 2000);
                }
            }, 2500);
        };

        window.addEventListener('DOMContentLoaded', () => {
            if(window.I18N) window.I18N.translatePage();
        });
    </script>
</body>
</html>
