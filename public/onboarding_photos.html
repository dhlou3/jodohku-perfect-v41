<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding - Photos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --text-dark: #1F2937; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .phone { width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; padding-top: 40px; }
        .header { padding: 20px 24px; display: flex; align-items: center; gap: 20px; }
        .back-btn { font-size: 24px; color: #9CA3AF; text-decoration: none; }
        .progress-line { flex: 1; height: 4px; background: #F3F4F6; border-radius: 100px; display: flex; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--orange); width: 90%; }
        .content { flex: 1; padding: 40px 24px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--text-dark); margin-bottom: 12px; }
        .subtitle { font-size: 15px; color: #6B7280; margin-bottom: 30px; line-height: 1.5; font-weight: 500; }
        
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .photo-slot { width: 100%; aspect-ratio: 3/4; background: #F9FAFB; border-radius: 15px; position: relative; cursor: pointer; overflow: hidden; border: 2px dashed #D1D5DB; transition: 0.3s; }
        .photo-slot.filled { border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
        .add-btn { position: absolute; bottom: 8px; right: 8px; width: 28px; height: 28px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 3px solid white; font-size: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .footer { padding: 20px 24px 60px; }
        .next-btn { width: 100%; padding: 18px; background: #9CA3AF; color: white; border-radius: 100px; font-size: 16px; font-weight: 700; text-align: center; border: none; cursor: pointer; text-decoration: none; display: block; opacity: 0.5; pointer-events: none; transition: 0.4s; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .next-btn.ready { opacity: 1; pointer-events: auto; background: var(--orange); box-shadow: 0 10px 20px rgba(198, 124, 34, 0.2); }
        
        #loading { position: absolute; inset: 0; background: rgba(255,255,255,0.8); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--orange); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    <link rel="prefetch" href="onboarding_wali.html?v=41.4">
</head>
<body>
    <div class="phone">
        <div id="loading">
            <div class="spinner"></div>
            <div style="font-size: 14px; font-weight: 800; color: var(--orange);" data-t="update_running">KEMASKINI SEDANG BERJALAN...</div>
        </div>

        <div class="header">
            <a href="javascript:void(0)" onclick="handleBack()" class="back-btn">←</a>
            <div class="progress-line"><div class="progress-fill"></div></div>
        </div>
        <div class="content">
            <h1 data-t="add_pics">Add your recent pics</h1>
            <p class="subtitle" data-t="pics_desc">Upload 2 photos to start. Add 4 or more to make your profile stand out.</p>
            
            <div class="photo-grid">
                <div class="photo-slot" onclick="triggerPicker(0)"><div class="add-btn">+</div></div>
                <div class="photo-slot" onclick="triggerPicker(1)"><div class="add-btn">+</div></div>
                <div class="photo-slot" onclick="triggerPicker(2)"><div class="add-btn">+</div></div>
                <div class="photo-slot" onclick="triggerPicker(3)"><div class="add-btn">+</div></div>
                <div class="photo-slot" onclick="triggerPicker(4)"><div class="add-btn">+</div></div>
                <div class="photo-slot" onclick="triggerPicker(5)"><div class="add-btn">+</div></div>
            </div>

            <input type="file" id="filePicker" hidden accept="image/*">
        </div>
        <div class="footer">
            <button onclick="saveAndNext()" class="next-btn" id="nextBtn" data-t="simpan_teruskan">Next</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';

        let photos = [null, null, null, null, null, null];
        let activeIdx = 0;

        // GLOBAL EXPOSURE FOR BUTTONS
        window.triggerPicker = function(idx) { 
            activeIdx = idx; 
            if (window.FlutterApp) {
                // Bridge to Native Android/iOS Gallery
                window.FlutterApp.postMessage('pickImage:' + idx);
            } else {
                // Fallback for Web/Desktop
                document.getElementById('filePicker').click(); 
            }
        }

        // NATIVE BRIDGE RECEIVER
        window.receiveImageFromFlutter = async function(idx, dataUrl) {
            document.getElementById('loading').style.display = 'flex';
            try {
                // We compress it one more time just to ensure standard grid formatting
                const compressedUrl = await compressImage(dataUrl);
                photos[idx] = compressedUrl;
                updateGrid();
            } catch (err) {
                console.error("Flutter Bridge Compress Error", err);
            }
            document.getElementById('loading').style.display = 'none';
        }

        window.removePhoto = function(idx) { 
            photos[idx] = null; 
            updateGrid(); 
        }

        window.saveAndNext = async function() {
            document.getElementById('loading').style.display = 'flex';
            const finalPhotos = photos.filter(p => p !== null);
            await DB.updateUser({ photos: finalPhotos, photoUrl: finalPhotos[0] || null });
            
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'profile') {
                window.location.href = 'profile_preview.html';
            } else {
                window.location.href = 'onboarding_wali.html?v=41.4';
            }
        }

        async function compressImage(dataUrl, maxWidth = 800, maxHeight = 800) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    if (width > height) { if (width > maxWidth) { height *= maxWidth / width; width = maxWidth; } } 
                    else { if (height > maxHeight) { width *= maxHeight / height; height = maxHeight; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
                img.src = dataUrl;
            });
        }

        document.getElementById('filePicker').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if (!file) return;
            document.getElementById('loading').style.display = 'flex';
            try {
                const reader = new FileReader();
                reader.onload = async (event) => {
                    const rawUrl = event.target.result;
                    const compressedUrl = await compressImage(rawUrl);
                    photos[activeIdx] = compressedUrl;
                    updateGrid();
                    document.getElementById('loading').style.display = 'none';
                };
                reader.readAsDataURL(file);
            } catch (err) {
                console.error("Picker Error:", err);
                document.getElementById('loading').style.display = 'none';
            }
        });

        function updateGrid() {
            const slots = document.querySelectorAll('.photo-slot');
            photos.forEach((p, i) => {
                if (p) {
                    slots[i].innerHTML = `<img src="${p}"><div class="add-btn" style="background: #9CA3AF">-</div>`;
                    slots[i].classList.add('filled');
                    slots[i].onclick = () => window.removePhoto(i);
                } else {
                    slots[i].innerHTML = `<div class="add-btn">+</div>`;
                    slots[i].classList.remove('filled');
                    slots[i].onclick = () => window.triggerPicker(i);
                }
            });
            const btn = document.getElementById('nextBtn');
            if (photos.filter(p => p !== null).length >= 2) btn.classList.add('ready');
            else btn.classList.remove('ready');
        }

        window.handleBack = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'profile') {
                window.location.href = 'profile_preview.html';
            } else {
                window.location.href = 'onboarding_prompts.html';
            }
        }

        window.addEventListener('load', async () => {
             if (window.I18N) window.I18N.translatePage();
             try {
                const user = await DB.getCurrentUser();
                if (user && user.photos && user.photos.length) {
                    user.photos.forEach((p, i) => { if(i < 6) photos[i] = p; });
                    updateGrid();
                }
             } catch(e) { console.error("Load Error:", e); }
        });
    </script>
</body>
</html>
