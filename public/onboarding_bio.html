<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Tentang Anda</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --text-dark: #1F2937; --bg-cream: #FDF9F4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .phone { width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; padding-top: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        
        .header { padding: 20px 24px; display: flex; align-items: center; gap: 20px; }
        .back-btn { font-size: 24px; color: #9CA3AF; text-decoration: none; transition: 0.3s; }
        .back-btn:hover { color: var(--orange); }
        .progress-line { flex: 1; height: 6px; background: #F3F4F6; border-radius: 100px; display: flex; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--orange); width: 75%; }
        
        .content { flex: 1; padding: 30px 24px; overflow-y: auto; scrollbar-width: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; color: var(--text-dark); margin-bottom: 12px; line-height: 1.1; }
        .subtitle { font-size: 15px; color: #6B7280; margin-bottom: 35px; line-height: 1.6; font-weight: 500; }
        
        .input-group { margin-bottom: 30px; }
        .label { font-size: 11px; font-weight: 900; color: #9CA3AF; margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        .textarea-card { background: var(--bg-cream); border-radius: 24px; padding: 22px; border: 2px solid transparent; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .textarea-card:focus-within { background: white; border-color: var(--orange); box-shadow: 0 15px 30px rgba(198, 124, 34, 0.1); transform: translateY(-2px); }
        
        textarea { width: 100%; height: 130px; border: none; background: transparent; font-size: 16px; color: var(--text-dark); outline: none; resize: none; line-height: 1.6; font-weight: 500; }
        
        .footer { padding: 40px 24px; background: white; }
        .next-btn { width: 100%; padding: 20px; background: var(--orange); color: white; border-radius: 100px; font-size: 17px; font-weight: 800; text-align: center; border: none; cursor: pointer; text-decoration: none; display: block; box-shadow: 0 12px 24px rgba(198, 124, 34, 0.25); transition: 0.3s; }
        .next-btn:active { transform: scale(0.97); box-shadow: 0 5px 10px rgba(198, 124, 34, 0.1); }
        .skip-btn-top { position: absolute; top: 60px; right: 30px; font-size: 14px; font-weight: 800; color: #9CA3AF; text-decoration: none; z-index: 100; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <a href="javascript:void(0)" onclick="handleBack()" class="back-btn">←</a>
            <div class="progress-line"><div class="progress-fill"></div></div>
            <button onclick="handleSkip()" class="skip-btn-top" data-t="langkau">Langkau</button>
        </div>
        <div class="content">
            <h1 data-t="kisah_title">Ceritakan Kisah Anda</h1>
            <p class="subtitle" data-t="kisah_desc">Bina taaruf yang bermakna dengan berkongsi serba sedikit tentang siapa anda dan apa yang anda cari.</p>
            
            <div class="input-group">
                <span class="label" data-t="status_hari_ini">📝 STATUS HARI INI</span>
                <div class="textarea-card">
                    <textarea id="statusInput" data-t="status_placeholder_bio" placeholder="Contoh: Berkongsi rezeki dan kasih sayang demi keredhaan Allah SWT..." autocomplete="off" spellcheck="false"></textarea>
                </div>
            </div>

            <div class="input-group">
                <span class="label" data-t="hobi_minggu">HOBI SAYA DI HUJUNG MINGGU</span>
                <div class="textarea-card">
                    <textarea id="hobbyInput" data-t="hobi_placeholder_bio" placeholder="Contoh: Memasak untuk keluarga, membaca buku motivasi, dan melawat tempat bersejarah Islam..." autocomplete="off" spellcheck="false"></textarea>
                </div>
            </div>
        </div>
        <div class="footer">
            <button onclick="saveAndNext()" class="next-btn" data-t="seterusnya_btn">Seterusnya ➔</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';

        window.saveAndNext = async function() {
            const status = document.getElementById('statusInput').value.trim();
            const hobby = document.getElementById('hobbyInput').value.trim();

            if (!status || !hobby) {
                const msg = window.I18N.getLang() === 'en' ? 'Please complete both parts of your story to proceed.' : 'Sila lengkapkan kedua-dua bahagian kisah anda untuk meneruskan taaruf.';
                alert(msg);
                return;
            }

            try {
                const ok = await DB.updateUser({ 
                    statusHariIni: status,
                    hobiHujungMinggu: hobby
                });
                if (ok) {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('from') === 'profile') {
                        window.location.href = 'profile_preview.html';
                    } else {
                        window.location.href = 'onboarding_prompts.html';
                    }
                } else alert('Sistem sibuk. Sila cuba lagi.');
            } catch (e) { console.error(e); }
        }

        window.handleBack = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'profile') {
                window.location.href = 'profile_preview.html';
            } else {
                window.location.href = 'onboarding_traits.html';
            }
        }

        window.handleSkip = () => {
            const params = new URLSearchParams(window.location.search);
            if (params.get('from') === 'profile') {
                window.location.href = 'profile_preview.html';
            } else {
                window.location.href = 'onboarding_prompts.html';
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
             if (window.I18N) window.I18N.translatePage();
             const user = await DB.getCurrentUser();
             if (user) {
                 if (user.statusHariIni) document.getElementById('statusInput').value = user.statusHariIni;
                 if (user.hobiHujungMinggu) document.getElementById('hobbyInput').value = user.hobiHujungMinggu;
             }
        });
    </script>
</body>
</html>
