<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Kerjaya & Kestabilan</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --text-dark: #1F2937; --bg-cream: #FDF9F4; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .phone { width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; padding-top: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        
        .header { padding: 20px 24px; display: flex; align-items: center; gap: 20px; }
        .back-btn { font-size: 24px; color: #9CA3AF; text-decoration: none; }
        .progress-line { flex: 1; height: 6px; background: #F3F4F6; border-radius: 100px; display: flex; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--orange); width: 35%; }
        
        .content { flex: 1; padding: 40px 24px; overflow-y: auto; scrollbar-width: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; color: var(--text-dark); margin-bottom: 12px; line-height: 1.1; }
        .subtitle { font-size: 15px; color: #6B7280; margin-bottom: 40px; line-height: 1.6; font-weight: 500; }
        
        .label { font-size: 12px; font-weight: 800; color: var(--orange); margin-bottom: 12px; display: block; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-card { background: var(--bg-cream); border-radius: 20px; padding: 18px; border: 2px solid transparent; transition: 0.3s; margin-bottom: 35px; }
        .input-card:focus-within { background: white; border-color: var(--orange); box-shadow: 0 10px 25px rgba(198, 124, 34, 0.1); }
        input[type="text"] { width: 100%; border: none; background: transparent; font-size: 20px; font-weight: 600; color: var(--text-dark); outline: none; }
        
        .salary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .salary-chip { padding: 16px 10px; border: 2px solid #F3F4F6; border-radius: 15px; font-size: 13px; font-weight: 700; color: #9CA3AF; text-align: center; cursor: pointer; transition: 0.3s; background: white; }
        .salary-chip.active { border-color: var(--orange); color: var(--text-dark); background: var(--bg-cream); box-shadow: 0 5px 15px rgba(198, 124, 34, 0.08); }
        .footer { padding: 40px 24px; }
        .next-btn { width: 100%; padding: 20px; background: var(--orange); color: white; border-radius: 100px; font-size: 17px; font-weight: 800; text-align: center; border: none; cursor: pointer; text-decoration: none; display: block; box-shadow: 0 12px 24px rgba(198, 124, 34, 0.25); transition: 0.3s; }
        .skip-btn-top { position: absolute; top: 60px; right: 30px; font-size: 14px; font-weight: 800; color: #9CA3AF; text-decoration: none; z-index: 100; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <a href="onboarding_ic.html" class="back-btn">←</a>
            <div class="progress-line"><div class="progress-fill"></div></div>
            <button onclick="window.location.href='onboarding_interests.html'" class="skip-btn-top" data-t="langkau">Langkau</button>
        </div>
        <div class="content">
            <h1 data-t="work_title">Kerjaya & Kestabilan</h1>
            <p class="subtitle" data-t="work_desc">Kestabilan kerjaya adalah salah satu faktor penting dalam membina keluarga yang bahagia.</p>
            
            <span class="label" data-t="label_profession">Pekerjaan</span>
            <div class="input-card">
                <input type="text" id="profInput" data-t="name_placeholder" placeholder="Contoh: Jurutera Perisian" autocomplete="off" spellcheck="false">
            </div>

            <span class="label" data-t="label_salary">Anggaran Gaji Bulanan</span>
            <div class="salary-grid">
                <div class="salary-chip" data-t="salary_1" onclick="selectSalary(this, '< RM 3k')">< RM 3,000</div>
                <div class="salary-chip" data-t="salary_2" onclick="selectSalary(this, 'RM 3k - 5k')">RM 3k - 5k</div>
                <div class="salary-chip" data-t="salary_3" onclick="selectSalary(this, 'RM 5k - 8k')">RM 5k - 8k</div>
                <div class="salary-chip" data-t="salary_4" onclick="selectSalary(this, 'RM 8k - 12k')">RM 8k - 12k</div>
                <div class="salary-chip" data-t="salary_5" onclick="selectSalary(this, 'RM 12k - 20k')">RM 12k - 20k</div>
                <div class="salary-chip" data-t="salary_6" onclick="selectSalary(this, '> RM 20k')">> RM 20,000</div>
            </div>
        </div>
        <div class="footer">
            <button onclick="saveAndNext()" class="next-btn" data-t="seterusnya_btn">Seterusnya ➔</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';

        let selectedSalary = null;
        window.selectSalary = function(el, val) {
            document.querySelectorAll('.salary-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedSalary = val;
        }

        window.saveAndNext = async function() {
            const profession = document.getElementById('profInput').value.trim();
            if(!profession || !selectedSalary) {
                const msg = window.I18N.getLang() === 'en' ? 'Please complete your career info.' : 'Sila lengkapkan maklumat kerjaya anda.';
                alert(msg);
                return;
            }
            try {
                const ok = await DB.updateUser({ 
                    profession: profession, 
                    salary: selectedSalary 
                });
                if (ok) window.location.href = 'onboarding_interests.html';
                else alert('Sistem sibuk. Sila cuba lagi.');
            } catch (e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
             if (window.I18N) window.I18N.translatePage();
             const user = await DB.getCurrentUser();
             if (user) {
                 if(user.profession) document.getElementById('profInput').value = user.profession;
                 if(user.salary) {
                     const chips = Array.from(document.querySelectorAll('.salary-chip'));
                     const target = chips.find(c => c.getAttribute('onclick').includes(user.salary));
                     if(target) window.selectSalary(target, user.salary);
                 }
             }
        });
    </script>
</body>
</html>tml>
