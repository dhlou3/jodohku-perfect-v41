<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jodohku - Daftar Akaun</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #BD8B52;
            --background: #0B0E14;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: linear-gradient(180deg, rgba(11, 14, 20, 0.4) 0%, #0B0E14 100%),
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 24px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(189, 139, 82, 0.1);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 32px; margin-bottom: 8px; }
        .tagline { color: var(--text-dim); font-size: 14px; margin-bottom: 32px; }

        .btn-google {
            width: 100%;
            padding: 16px;
            background: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .footer-note { margin-top: 24px; font-size: 14px; color: var(--text-dim); }
        .footer-note a { color: var(--gold); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="tagline">Join the community for a blessed journey.</p>

            <button class="btn-google" id="regBtn">
                <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="20" height="20">
                <span>Continue with Google</span>
            </button>

            <div class="footer-note">
                Already have an account? <a href="login_preview.html">Log In</a>
            </div>
        </div>
    </div>

    <!-- FIREBASE LEGACY -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZegwZmiUsddDY1-EcB27NYwuvxobkgx8",
            authDomain: "jodohku-61096.firebaseapp.com",
            projectId: "jodohku-61096",
            storageBucket: "jodohku-61096.firebasestorage.app",
            messagingSenderId: "982535553679",
            appId: "1:982535553679:web:b7146ace7d99475ce126fa",
        };

        if (typeof firebase !== 'undefined' && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const btn = document.getElementById('regBtn');

        btn.onclick = async () => {
            btn.style.background = '#FFD700'; // Visual proof
            btn.innerText = 'Connecting...';
            
            try {
                const bridge = window.AppBridge || (typeof AppBridge !== 'undefined' ? AppBridge : null);
                if (bridge) {
                    bridge.postMessage('googleLogin');
                    return;
                }

                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await firebase.auth().signInWithPopup(provider);
                if (result.user) {
                    localStorage.setItem('current_user_id', result.user.uid);
                    window.location.href = 'onboarding_name.html';
                }
            } catch (e) {
                console.error(e);
                btn.style.background = '#FFFFFF';
                btn.innerText = 'Continue with Google';
            }
        };
    </script>
</body>
</html>
