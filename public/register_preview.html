<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jodohku - Daftar Akaun</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #BD8B52;
            --background: #0B0E14;
            --text-main: #FFFFFF;
            --text-dim: #A0A0A0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
        }

        .phone-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: linear-gradient(180deg, rgba(11, 14, 20, 0.4) 0%, #0B0E14 100%),
                        url('https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 40px 24px;
            overflow: hidden;
        }

        /* Desktop Optimization */
        @media (min-width: 481px) {
            body { 
                background: #111827; 
                display: flex; justify-content: center; align-items: center; 
            }
            .phone-container { 
                width: 375px; height: 812px; border-radius: 44px; border: 8px solid #1E293B; 
                box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            }
        }

        .hero-section {
            position: absolute;
            top: 25%;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 0 40px;
        }

        .logo-symbol {
            width: 60px; height: 60px;
            border: 2px solid var(--gold);
            border-radius: 60%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(189,139,82,0.1);
            position: relative;
        }
        .logo-symbol::after {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 24px; height: 2px;
            background: var(--gold);
        }
        .logo-symbol::before {
            content: '';
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 2px; height: 24px;
            background: var(--gold);
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 36px; margin-bottom: 8px; }
        .tagline { color: var(--text-dim); font-size: 16px; margin-bottom: 32px; font-weight: 300; }

        .auth-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            border: 1px solid rgba(189, 139, 82, 0.1);
            margin-bottom: 20px;
        }

        .btn-google {
            width: 100%;
            padding: 18px;
            background: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 100px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
        }
        
        .footer-note { margin-top: 24px; font-size: 14px; color: var(--text-dim); }
        .footer-note a { color: var(--gold); text-decoration: none; font-weight: 600; }

    </style>
</head>
<body>
    <div class="phone-container">
        <div class="hero-section">
            <div class="logo-symbol"></div>
            <h1>Create Account</h1>
            <p class="tagline">Join the community for a blessed journey.</p>
        </div>
        <div class="auth-card">
            <button class="btn-google" id="regBtn">
                <img src="https://img.icons8.com/color/48/000000/google-logo.png" width="20" height="20">
                <span>Continue with Google</span>
            </button>
            <div class="footer-note">Already have an account? <a href="login_preview.html">Log In</a></div>
        </div>
    </div>

    <!-- FIREBASE BASE -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZegwZmiUsddDY1-EcB27NYwuvxobkgx8",
            authDomain: "jodohku-61096.firebaseapp.com",
            projectId: "jodohku-61096",
            storageBucket: "jodohku-61096.firebasestorage.app",
            messagingSenderId: "982535553679",
            appId: "1:982535553679:web:b7146ace7d99475ce126fa",
        };
        firebase.initializeApp(firebaseConfig);

        const btn = document.getElementById('regBtn');

        async function handleAuthSuccess(user) {
            localStorage.setItem('current_user_id', user.uid);
            
            try {
                const db = firebase.firestore();
                const snap = await db.collection('users').doc(user.uid).get();
                
                if (snap.exists) {
                    window.location.href = 'home_preview.html';
                } else {
                    window.location.href = 'onboarding_name.html';
                }
            } catch (err) {
                log('Firestore Error: ' + err.message);
            }
        }

        btn.onclick = async () => {
            btn.innerText = 'Connecting...';
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                
                if (isMobile) {
                    await firebase.auth().signInWithRedirect(provider);
                } else {
                    const result = await firebase.auth().signInWithPopup(provider);
                    if (result.user) {
                        await handleAuthSuccess(result.user);
                    }
                }
            } catch (e) {
                log('AUTH ERROR: ' + e.message);
                btn.innerText = 'Continue with Google';
            }
        };

        window.onload = () => {
            log('Checking for redirect result...');
            firebase.auth().getRedirectResult().then(async (result) => {
                if (result && result.user) {
                    log('Redirect Success!');
                    await handleAuthSuccess(result.user);
                } else {
                    log('No cached session found.');
                }
            }).catch((error) => {
                log('Redirect Error: ' + error.message);
            });

            const params = new URLSearchParams(window.location.search);
            if (params.get('provider') === 'google') {
                log('Auto-triggering registration...');
                btn.click();
            }
        };
    </script>
</body>
</html>
