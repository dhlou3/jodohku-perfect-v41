<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Sifat Unik</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --orange: #C67C22; --text-dark: #1F2937; --bg-cream: #FDF9F4; --brand-pink: #FD297B; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #E5E7EB; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .phone { width: 375px; height: 812px; background: white; border-radius: 44px; border: 8px solid #1E293B; position: relative; overflow: hidden; display: flex; flex-direction: column; padding-top: 40px; box-shadow: 0 40px 80px rgba(0,0,0,0.1); }
        
        .header { padding: 20px 24px; display: flex; align-items: center; gap: 20px; }
        .back-btn { font-size: 24px; color: #9CA3AF; text-decoration: none; }
        .progress-line { flex: 1; height: 6px; background: #F3F4F6; border-radius: 100px; display: flex; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--orange); width: 65%; }
        
        .content { flex: 1; padding: 30px 24px; overflow-y: auto; scrollbar-width: none; }
        h1 { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 900; color: var(--text-dark); margin-bottom: 12px; line-height: 1.1; }
        .subtitle { font-size: 15px; color: #6B7280; margin-bottom: 40px; line-height: 1.6; font-weight: 500; }
        
        .chip-group { margin-bottom: 35px; }
        .chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .chip { padding: 12px 20px; border: 2px solid #F3F4F6; border-radius: 100px; font-size: 14px; font-weight: 700; color: #9CA3AF; cursor: pointer; transition: 0.3s; background: white; white-space: nowrap; }
        .chip:hover { border-color: var(--orange); }
        .chip.selected { background: var(--orange); color: white; border-color: var(--orange); box-shadow: 0 8px 15px rgba(198, 124, 34, 0.15); }

        .footer { padding: 30px 24px 40px; background: white; }
        .next-btn { width: 100%; padding: 20px; background: var(--orange); color: white; border-radius: 100px; font-size: 17px; font-weight: 800; text-align: center; border: none; cursor: pointer; text-decoration: none; display: block; box-shadow: 0 12px 24px rgba(198, 124, 34, 0.25); }
        .skip-btn-top { position: absolute; top: 60px; right: 30px; font-size: 14px; font-weight: 800; color: #9CA3AF; text-decoration: none; z-index: 100; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>
    <div class="phone">
        <div class="header">
            <a href="onboarding_interests.html" class="back-btn">←</a>
            <div class="progress-line"><div class="progress-fill"></div></div>
            <button onclick="window.location.href='onboarding_bio.html'" class="skip-btn-top" data-t="langkau">Langkau</button>
        </div>
        <div class="content">
            <h1 data-t="traits_title">Sifat Unik Anda</h1>
            <p class="subtitle" data-t="traits_desc">Pilih 3 lencana yang paling menggambarkan personaliti dan gaya hidup anda.</p>
            
            <div class="chip-group">
                <div class="chips">
                    <div class="chip" data-t="trait_introvert">Introvert</div>
                    <div class="chip" data-t="trait_extrovert">Extrovert</div>
                    <div class="chip" data-t="trait_spender">Borang</div>
                    <div class="chip" data-t="trait_saver">Berjimat</div>
                    <div class="chip" data-t="trait_traveler">Kembara Dunia</div>
                    <div class="chip" data-t="trait_homebody">Suka Duduk Rumah</div>
                </div>
            </div>
        </div>
        <div class="footer">
            <button onclick="saveAndNext()" class="next-btn" data-t="seterusnya_btn">Seterusnya ➔</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';

        let selectedTraits = [];

        document.querySelectorAll('.chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const val = chip.getAttribute('data-t');
                if (chip.classList.contains('selected')) {
                    chip.classList.remove('selected');
                    selectedTraits = selectedTraits.filter(t => t !== val);
                } else {
                    if (selectedTraits.length >= 3) {
                        // For traits we limit to 3 for clean display on badges
                        const first = selectedTraits.shift();
                        document.querySelectorAll('.chip').forEach(c => {
                             if(c.getAttribute('data-t') === first) c.classList.remove('selected');
                        });
                    }
                    chip.classList.add('selected');
                    selectedTraits.push(val);
                }
            });
        });

        window.saveAndNext = async function() {
            if (selectedTraits.length === 0) {
                const msg = window.I18N.getLang() === 'en' ? 'Please select at least one trait.' : 'Sila pilih sekurang-kurangnya satu sifat.';
                alert(msg);
                return;
            }
            try {
                // Traits map to the 'badges' field in our DB schema used by home_preview
                const ok = await DB.updateUser({ 
                    traits: selectedTraits,
                    badges: selectedTraits // Redundancy for compatibility with matching engine
                });
                if (ok) window.location.href = 'onboarding_bio.html';
                else alert('Sistem sibuk. Sila cuba lagi.');
            } catch (e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
             if (window.I18N) window.I18N.translatePage();
             const user = await DB.getCurrentUser();
             if (user && user.traits) {
                 selectedTraits = user.traits;
                 document.querySelectorAll('.chip').forEach(chip => {
                     const val = chip.getAttribute('data-t');
                     if (selectedTraits.includes(val)) {
                         chip.classList.add('selected');
                     }
                 });
             }
        });
    </script>
</body>
</html>
