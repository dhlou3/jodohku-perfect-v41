<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Sembang Preview</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <script src="i18n.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --gold: #BD8B52;
            --bg-cream: #FCFAF7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #E5E7EB;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .phone {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 44px;
            border: 8px solid #1E293B;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            body {
                background: white;
            }

            .phone {
                width: 100vw;
                height: 100vh;
                border: none;
                border-radius: 0;
            }
        }

        .header {
            padding: 55px 24px 15px;
            padding-top: max(55px, env(safe-area-inset-top));
            background: white;
            border-bottom: 1px solid #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 1000;
            color: #111827;
        }

        .tab-bar {
            display: flex;
            background: white;
            border-bottom: 1px solid #F3F4F6;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            font-size: 11px;
            font-weight: 900;
            color: #9CA3AF;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }

        .tab.active {
            color: var(--gold);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 25%;
            width: 50%;
            height: 3px;
            background: var(--gold);
            border-radius: 100px;
        }

        .content-slider {
            flex: 1;
            display: flex;
            width: 300%;
            transition: 0.3s ease-out;
        }

        .column {
            width: 33.333%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-cream);
            scrollbar-width: none;
            padding-bottom: 120px;
        }

        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .match-card {
            background: white;
            border-radius: 24px;
            padding: 15px;
            text-align: center;
            border: 1.5px solid white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03);
            cursor: pointer;
        }

        .match-av {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            margin: 0 auto 12px;
            border: 3px solid var(--gold);
            padding: 3px;
            overflow: hidden;
        }

        .match-av img,
        .match-av div {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #F3F4F6;
            font-weight: 900;
            color: var(--gold);
            font-size: 24px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-item {
            background: white;
            padding: 18px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(0, 0, 0, 0.02);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            position: relative;
        }

        .chat-av {
            width: 55px;
            height: 55px;
            border-radius: 10%;
            overflow: hidden;
            flex-shrink: 0;
            background: #F3F4F6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: var(--gold);
        }

        .chat-av img,
        .chat-av div {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 800;
            color: #111827;
            margin-bottom: 2px;
        }

        .chat-msg {
            font-size: 13px;
            color: #6B7280;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #chatOverlay {
            position: absolute;
            top: 0;
            left: 100%;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 200;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        #chatOverlay.active {
            transform: translateX(-100%);
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }

        .me {
            align-self: flex-end;
            background: var(--gold);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .them {
            align-self: flex-start;
            background: white;
            color: #111827;
            border-bottom-left-radius: 4px;
            border: 1px solid #E5E7EB;
        }

        .nav-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 85px;
            background: white;
            border-top: 1px solid #F3F4F6;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #9CA3AF;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--gold);
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="phone">
        <header class="header">
            <h1>Sembang</h1>
            <div style="font-size:22px;" id="sysIcon">✉️</div>
        </header>
        <div class="tab-bar">
            <div class="tab" onclick="setPage(0)">Padan</div>
            <div class="tab active" onclick="setPage(1)">Sembang</div>
            <div class="tab" onclick="setPage(2)">Wali</div>
        </div>
        <div class="content-slider" id="slider" style="transform: translateX(-33.333%);">
            <div class="column">
                <div id="pList" class="match-grid"></div>
            </div>
            <div class="column">
                <div id="cList" class="chat-list"></div>
            </div>
            <div class="column">
                <div id="wList" class="chat-list"></div>
            </div>
        </div>
        <div id="chatOverlay">
            <header
                style="padding: 55px 20px 15px; padding-top: max(55px, env(safe-area-inset-top)); background:white; border-bottom:1px solid #F3F4F6; display:flex; align-items:center; gap:12px;">
                <div onclick="closeChat()" style="cursor:pointer; font-size:24px;">‹</div>
                <div id="activeAv"
                    style="width:38px; height:38px; border-radius:10px; background:var(--gold); display:flex; align-items:center; justify-content:center; color:white; font-weight:900; overflow:hidden;">
                </div>
                <div style="flex:1;">
                    <div id="activeName" style="font-weight:900; font-size:16px;">...</div>
                </div>
            </header>
            <div class="chat-area" id="chatArea"
                style="flex:1; padding:20px; overflow-y:auto; background:var(--bg-cream); display:flex; flex-direction:column; gap:12px; padding-bottom:100px; scrollbar-width:none;">
            </div>
            <div
                style="position:absolute; bottom: max(20px, env(safe-area-inset-bottom)); left:20px; right:20px; background:white; border-radius:100px; padding:6px 6px 6px 18px; display:flex; align-items:center; box-shadow:0 10px 30px rgba(0,0,0,0.05);">
                <input type="text" id="mIn" placeholder="Mesej taaruf..."
                    style="flex:1; border:none; outline:none; font-size:14px; font-weight:600;"><button
                    onclick="sendMsg()"
                    style="width:44px; height:44px; background:var(--gold); color:white; border:none; border-radius:50%; font-size:18px; cursor:pointer;">➔</button>
            </div>
        </div>
        <nav class="nav-bar">
            <a href="home_preview.html" class="nav-item">
                <div class="nav-icon">🏠</div><span>Utama</span>
            </a><a href="explore_preview.html" class="nav-item">
                <div class="nav-icon">🔍</div><span>Jelajah</span>
            </a><a href="chat_preview.html" class="nav-item active">
                <div class="nav-icon">💬</div><span>Sembang</span>
            </a><a href="islam_preview.html" class="nav-item">
                <div class="nav-icon">🕌</div><span>Islam</span>
            </a><a href="profile_preview.html" class="nav-item">
                <div class="nav-icon">👤</div><span>Saya</span>
            </a>
        </nav>
    </div>
    <script type="module">
        import { DB } from './database.js';
        import {
            collection, onSnapshot, doc, getDoc, query, orderBy, getDocs
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        let myUid = null; let activeMatchId = null; let unsub = null;

        // GLOBAL EXPOSURE
        window.setPage = (idx) => { document.getElementById('slider').style.transform = `translateX(-${(idx * 100) / 3}%)`; const tabs = document.querySelectorAll('.tab'); tabs.forEach((t, i) => t.classList.toggle('active', i === idx)); };
        window.closeChat = () => { document.getElementById('chatOverlay').classList.remove('active'); if (unsub) unsub(); };
        window.sendMsg = async () => { const input = document.getElementById('mIn'); const text = input.value.trim(); if (!text || !activeMatchId) return; await DB.sendMessage(activeMatchId, myUid, text); input.value = ''; };

        window.openChat = async (mid) => {
            activeMatchId = mid; const db = window.firestore_db;
            const mSnap = await getDoc(doc(db, "chats", mid)); if (!mSnap.exists()) return;
            const chat = mSnap.data(); const targetId = (chat.memberA === myUid) ? chat.memberB : chat.memberA;
            const tSnap = await getDoc(doc(db, "users", targetId)); const target = tSnap.data() || { fullName: "Calon" };
            document.getElementById('activeName').innerText = target.fullName || "User";
            document.getElementById('activeAv').innerHTML = target.photoUrl ? `<img src="${target.photoUrl}" style="width:100%; height:100%; object-fit:cover;">` : `<div>${(target.fullName || "U")[0]}</div>`;
            document.getElementById('chatOverlay').classList.add('active');
            if (unsub) unsub();
            unsub = onSnapshot(query(collection(db, "chats", mid, "messages"), orderBy("time", "asc")), async (snap) => {
                const area = document.getElementById('chatArea'); area.innerHTML = '';
                snap.forEach(d => {
                    const m = d.data(); const el = document.createElement('div');
                    el.className = `msg ${m.from === myUid ? 'me' : 'them'}`; el.innerText = m.text;
                    area.appendChild(el);
                });
                area.scrollTop = area.scrollHeight;
            });
        };

        const formatTime = (ts) => {
            if (!ts) return "Baru"; const date = ts.toDate ? ts.toDate() : new Date(ts); const now = new Date();
            const diff = (now - date) / 1000; if (diff < 60) return "Seketika"; if (diff < 3600) return Math.floor(diff / 60) + "m";
            return date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
        };

        async function init() {
            setPage(1); console.log("🚀 Powering up engine...");

            // Watchdog for firestore_db
            for (let i = 0; i < 15; i++) { if (window.firestore_db) break; await new Promise(r => setTimeout(r, 200)); }

            const me = await DB.getCurrentUser();
            if (!me) {
                document.getElementById('sysIcon').innerText = "⚠️";
                console.error("❌ SHUTDOWN: No User Identity");
                return;
            }

            myUid = me.uid; const phone = me.phone || "";
            const db = window.firestore_db;

            const updateUI = async (snapDocs) => {
                const pList = document.getElementById('pList'); const cList = document.getElementById('cList'); const wList = document.getElementById('wList');
                pList.innerHTML = ''; cList.innerHTML = ''; wList.innerHTML = '';

                console.log(`[SYNC] Channels: ${snapDocs.length}`);

                if (snapDocs.length === 0) {
                    pList.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#9CA3AF; font-size:13px; font-weight:700;">Mula Padan Sekarang! ✨</div>';
                    return;
                }

                for (const d of snapDocs) {
                    const c = d.data();
                    const isAnyA = (c.memberA === myUid) || (phone && c.memberAPhone === phone);
                    const partnerId = isAnyA ? c.memberB : c.memberA;

                    try {
                        let partner = { uid: partnerId, fullName: "Calon Jodohku" };
                        const pSnap = await getDoc(doc(db, "users", partnerId)); if (pSnap.exists()) partner = { uid: pSnap.id, ...pSnap.data() };

                        const name = partner.fullName || partner.name || "User";
                        const av = partner.photoUrl ? `<img src="${partner.photoUrl}">` : `<div>${(name || "U")[0]}</div>`;
                        const msg = c.lastMessage || "Padanan Berjaya! ✨";
                        const time = formatTime(c.lastTime);

                        const item = document.createElement('div');
                        item.className = 'chat-item';
                        item.style = "background:white; padding:18px; border-radius:24px; display:flex; align-items:center; gap:15px; border:1px solid rgba(0,0,0,0.02); box-shadow:0 8px 20px rgba(0,0,0,0.02); cursor:pointer; margin-bottom:10px;";
                        item.innerHTML = `
                            <div class="chat-av" style="width:55px; height:55px; border-radius:12px; overflow:hidden; background:#F3F4F6; display:flex; align-items:center; justify-content:center; font-weight:900; color:var(--gold);">${av}</div>
                            <div class="chat-info" style="flex:1; min-width:0;">
                                <div class="chat-name" style="font-size:16px; font-weight:800; color:#111827; margin-bottom:2px;">${name}</div>
                                <div class="chat-msg" style="font-size:13px; color:#6B7280; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${msg}</div>
                            </div>
                            <div style="font-size:10px; color:#9CA3AF; font-weight:800;">${time}</div>
                        `;
                        item.onclick = () => openChat(d.id);

                        if (c.lastMessage && c.lastMessage !== "Padanan Berjaya! ✨") cList.appendChild(item);
                        else pList.appendChild(item);
                    } catch (e) { console.error(e); }
                }

                // Inject Empty States if lists are empty after processing
                if (cList.children.length === 0) {
                    cList.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#9CA3AF;">
                        <div style="font-size:40px; margin-bottom:15px;">💬</div>
                        <div style="font-size:14px; font-weight:800; color:#374151; margin-bottom:5px;">Tiada perbualan lagi.</div>
                        <div style="font-size:12px; font-weight:600;">Mula bertegur sapa dengan padanan anda!</div>
                    </div>`;
                }

                if (wList.children.length === 0) {
                    wList.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#9CA3AF;">
                        <div style="font-size:40px; margin-bottom:15px;">🛡️</div>
                        <div style="font-size:14px; font-weight:800; color:#374151; margin-bottom:5px;">Tiada Wali berdaftar.</div>
                        <div style="font-size:12px; font-weight:600;">Jemput Wali anda untuk keberkatan.</div>
                        <a href="wali_setup_preview.html" style="display:inline-block; margin-top:15px; padding:10px 20px; background:var(--gold); color:white; border-radius:100px; font-size:12px; font-weight:800; text-decoration:none;">Daftar Wali</a>
                    </div>`;
                }
            };

            onSnapshot(collection(db, "chats"), (snapshot) => {
                const myChats = snapshot.docs.filter(d => {
                    const dta = d.data();
                    const matchA = dta.memberA === myUid || (phone && dta.memberAPhone === phone);
                    const matchB = dta.memberB === myUid || (phone && dta.memberBPhone === phone);
                    return matchA || matchB;
                });
                updateUI(myChats);
            });
        }
        init();
    </script>
</body>

</html>
