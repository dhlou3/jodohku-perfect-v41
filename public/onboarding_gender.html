<!DOCTYPE html>
<html lang="ms">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Jantina Anda</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap"
        rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root {
            --gold: #BD8B52;
            --orange: #C67C22;
            --text-dark: #1F2937;
            --bg-cream: #FDF9F4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: #E5E7EB;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .phone {
            width: 375px;
            height: 812px;
            background: white;
            border-radius: 44px;
            border: 8px solid #1E293B;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-top: 40px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
        }

        .header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .back-btn {
            font-size: 24px;
            color: #9CA3AF;
            text-decoration: none;
        }

        .progress-line {
            flex: 1;
            height: 6px;
            background: #F3F4F6;
            border-radius: 100px;
            display: flex;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--orange);
            width: 35%;
        }

        .content {
            flex: 1;
            padding: 40px 24px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-weight: 900;
            color: var(--text-dark);
            margin-bottom: 12px;
            line-height: 1.1;
        }

        .subtitle {
            font-size: 15px;
            color: #6B7280;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 500;
        }

        .gender-option {
            width: 100%;
            padding: 22px;
            border: 2px solid #F3F4F6;
            border-radius: 24px;
            font-size: 18px;
            font-weight: 700;
            color: #9CA3AF;
            text-align: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-cream);
        }

        .gender-option.active {
            border-color: var(--orange);
            color: var(--text-dark);
            background: white;
            box-shadow: 0 15px 30px rgba(198, 124, 34, 0.1);
            transform: translateY(-2px);
        }

        .footer {
            padding: 40px 24px;
        }

        .next-btn {
            width: 100%;
            padding: 20px;
            background: var(--orange);
            color: white;
            border-radius: 100px;
            font-size: 17px;
            font-weight: 800;
            text-align: center;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-shadow: 0 12px 24px rgba(198, 124, 34, 0.25);
            transition: 0.3s;
            opacity: 0.5;
            pointer-events: none;
        }

        .next-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        .next-btn:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>
    <div class="phone">
        <div class="header">
            <a href="onboarding_birthday.html" class="back-btn">←</a>
            <div class="progress-line">
                <div class="progress-fill"></div>
            </div>
        </div>
        <div class="content">
            <h1 data-t="gender_title">Apakah identiti taaruf anda?</h1>
            <p class="subtitle" data-t="gender_desc">Ini membantu kami mencari padanan yang paling serasi mengikut prinsip Syariah.</p>

            <div class="gender-option" data-t="saya_wanita" onclick="selectGender(this, 'woman')">Saya seorang Wanita</div>
            <div class="gender-option" data-t="saya_lelaki" onclick="selectGender(this, 'man')">Saya seorang Lelaki</div>
        </div>
        <div class="footer">
            <button onclick="saveAndNext()" class="next-btn" id="nextBtn" data-t="seterusnya_btn">Seterusnya ➔</button>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';

        let selected = null;
        window.selectGender = function (el, val) {
            document.querySelectorAll('.gender-option').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            selected = val;
            document.getElementById('nextBtn').classList.add('ready');
        }

        window.saveAndNext = async function () {
            if (!selected) return;
            try {
                const ok = await DB.updateUser({ gender: selected });
                if (ok) window.location.href = 'onboarding_work.html';
                else alert('Sistem sibuk. Sila cuba lagi.');
            } catch (e) { console.error(e); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            if (window.I18N) window.I18N.translatePage();
            const user = await DB.getCurrentUser();
            if (user && user.gender) {
                // If already set, show selection
                const opts = document.querySelectorAll('.gender-option');
                opts.forEach(opt => {
                    const val = opt.getAttribute('onclick').split("'")[3];
                    if (val === user.gender) window.selectGender(opt, user.gender);
                });
            }
        });
    </script>
</body>

</html>
