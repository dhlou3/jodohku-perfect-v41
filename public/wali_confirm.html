<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodohku - Pengesahan Wali</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Playfair+Display:wght@700;950&display=swap" rel="stylesheet">
    <script src="i18n.js"></script>
    <style>
        :root { --gold: #BD8B52; --bg-cream: #FCFAF7; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Outfit', sans-serif; }
        body { background: var(--bg-cream); min-height:100vh; padding: 20px; display:flex; flex-direction:column; align-items:center; }
        .card { max-width: 500px; width:100%; background:white; border-radius:32px; padding:40px; box-shadow:0 20px 50px rgba(0,0,0,0.05); text-align:center; margin-top:40px; border: 1px solid rgba(189,139,82,0.1); }
        .logo { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 1000; color: var(--gold); margin-bottom:10px; letter-spacing: -1px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: #111827; margin-bottom:15px; }
        p { color: #6B7280; font-size: 15px; line-height: 1.6; margin-bottom:30px; font-weight: 500; }
        .btn { display:block; width:100%; padding:18px; border-radius:100px; font-weight:900; font-size:15px; text-decoration:none; cursor:pointer; border:none; margin-bottom:15px; transition:0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-primary { background: linear-gradient(135deg, #BD8B52, #a6733a); color:white; box-shadow: 0 10px 20px rgba(189,139,82,0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(189,139,82,0.3); }
        .btn-secondary { background: #F8FAFC; color: #64748B; border: 1px solid #E2E8F0; }
        .matching-box { background:#FCFAF7; border:1px solid rgba(189,139,82,0.1); border-radius:32px; padding:30px; display:flex; justify-content:center; align-items:center; gap:25px; margin-bottom:30px; }
        .avatar { width:80px; height:80px; border-radius:24px; background:var(--gold); display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:28px; border:3px solid white; box-shadow:0 8px 20px rgba(0,0,0,0.1); overflow:hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .status-badge { display:inline-block; padding:8px 20px; border-radius:100px; font-size:12px; font-weight:900; margin-bottom:20px; letter-spacing:1px; text-transform: uppercase; }
        .status-wait { background:rgba(189,139,82,0.1); color:var(--gold); border: 1px dashed var(--gold); }
        .status-ok { background:#DCFCE7; color:#166534; border: 1px solid #BBF7D0; }
    </style>
</head>
<body>
    <div class="logo">Jodohku</div>
    <div class="card" id="app">
        <h1 data-t="wali_confirm_title">Guardian Authorization</h1>
        <p id="desc" data-t="loading">Reviewing Taaruf logistics...</p>
        
        <div class="matching-box" id="matchUI" style="display:none;">
            <div id="avA" class="avatar">A</div>
            <div style="font-size:32px; align-self:center;">🤝</div>
            <div id="avB" class="avatar">B</div>
        </div>

        <div id="status" class="status-badge status-wait" style="display:none;">AWAITING YOUR APPROVAL</div>

        <div id="actions" style="display:none;">
            <button class="btn btn-primary" onclick="confirm()">APPROVE MEETING</button>
            <button class="btn btn-secondary" onclick="reject()">DECLINE</button>
        </div>
        
        <div id="success" style="display:none;">
            <div style="font-size:60px; margin-bottom:20px;">🛡️</div>
            <h2 style="font-family:'Playfair Display'; font-weight:1000; color:#166534; margin-bottom:10px; font-size: 28px;">Authorization Complete</h2>
            <p>Alhamdulillah, your formal blessing has been recorded. Both candidates will be notified that the official Handshake meeting is authorized.</p>
        </div>
    </div>

    <script type="module">
        import { DB } from './database.js';
        
        const params = new URLSearchParams(window.location.search);
        const mid = params.get('mid');
        const side = params.get('side');
        const type = params.get('type') || 'taaruf'; // Default to taaruf for safety

        async function init() {
            if (window.I18N) window.I18N.translatePage();
            if(!mid || !side) {
                document.getElementById('desc').innerText = window.I18N.t('error_invalid_link') || "Error: Invalid link.";
                return;
            }

            // --- SIMULATION MODE INTERCEPTOR ---
            if(mid === 'test' || mid.includes('mock')) {
                console.log("🛡️ Sentinel Simulation Active: Bypassing Firestore fetch.");
                const mockData = {
                    nameA: "Zulkifli Ahmad",
                    nameB: "Siti Nurhaliza",
                    details: { place: "Zus Coffee, KL", date: "24 Apr 2024", time: "2:00 PM" }
                };
                renderMockConfirm(mockData);
                return;
            }

            try {
                const db = window.firestore_db;
                const { doc, getDoc } = window.fs_sdk;
                const mSnap = await getDoc(doc(db, "chats", mid));
                
                if(!mSnap.exists()) {
                    document.getElementById('desc').innerText = window.I18N.t('error_not_found') || "Error: Meeting not found.";
                    return;
                }

                const data = mSnap.data();
                const [uA, uB] = await Promise.all([
                    getDoc(doc(db, "users", data.memberA)),
                    getDoc(doc(db, "users", data.memberB))
                ]);

                const nameA = uA.data()?.fullName || "Candidate A";
                const nameB = uB.data()?.fullName || "Candidate B";
                const picA = uA.data()?.photoUrl;
                const picB = uB.data()?.photoUrl;
                
                document.getElementById('desc').innerText = `Do you authorize the formal meeting between ${nameA} and ${nameB}?`;
                
                document.getElementById('avA').innerHTML = picA ? `<img src="${picA}">` : nameA[0];
                document.getElementById('avB').innerHTML = picB ? `<img src="${picB}">` : nameB[0];
                
                const confirmed = type === 'meeting' 
                    ? (side === 'A' ? data.meetingWaliAConfirmed : data.meetingWaliBConfirmed)
                    : (side === 'A' ? data.waliAConfirmed : data.waliBConfirmed);

                if(type === 'meeting' && data.meetingDetails) {
                    const det = data.meetingDetails;
                    const locStr = `<b>LOCATION:</b> ${det.place}<br><b>DATE:</b> ${det.date}<br><b>TIME:</b> ${det.time}`;
                    document.getElementById('desc').innerHTML = `<div style="text-align:left; background:rgba(189,139,82,0.05); padding:20px; border-radius:20px; border:1px solid rgba(189,139,82,0.1);">${locStr}</div>`;
                }

                if(confirmed) {
                    showSuccess();
                } else {
                    document.getElementById('matchUI').style.display = 'flex';
                    document.getElementById('status').style.display = 'inline-block';
                    document.getElementById('actions').style.display = 'block';
                }
            } catch(e) { console.error(e); }
        }

        window.confirm = async () => {
            if(mid === 'test' || mid.includes('mock')) {
                showSuccess();
                return;
            }
            const ok = type === 'meeting' 
                ? await DB.confirmMeetingApproval(mid, side)
                : await DB.confirmWaliMeeting(mid, side);
            if(ok) showSuccess();
            else alert(window.I18N.t('tech_error'));
        };

        window.reject = () => {
            alert(window.I18N.t('contact_secretariat_cancel') || "Sila hubungi urusetia untuk pembatalan.");
        };

        function showSuccess() {
            document.getElementById('matchUI').style.display = 'none';
            document.getElementById('status').innerText = window.I18N.t('wali_confirmed') || "Confirmed ✅";
            document.getElementById('status').className = "status-badge status-ok";
            document.getElementById('actions').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            document.getElementById('desc').style.display = 'none';
        }

        window.renderMockConfirm = (data) => {
            document.getElementById('desc').innerHTML = `<b>${window.I18N.t('pilih_lokasi')}</b><br><br>Place: ${data.details.place}<br>Date: ${data.details.date}<br>Time: ${data.details.time}`;
            document.getElementById('avA').innerText = data.nameA[0];
            document.getElementById('avB').innerText = data.nameB[0];
            document.getElementById('matchUI').style.display = 'flex';
            document.getElementById('status').style.display = 'inline-block';
            document.getElementById('actions').style.display = 'block';
        };

        init();
    </script>
</body>
</html>
